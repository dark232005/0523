<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Something Beautiful is Coming</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff4e7a,#ff7aa2,#ffb6c1);
overflow:hidden;
color:white;
text-align:center;
}

/* floating hearts */

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 8s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* main card */

.container{
position:relative;
padding:60px;
width:480px;
background:rgba(255,255,255,0.15);
border-radius:25px;
backdrop-filter:blur(12px);
box-shadow:0 0 40px rgba(0,0,0,0.2);
}

h1{
font-size:42px;
margin-bottom:15px;
}

.name{
font-family:'Great Vibes',cursive;
font-size:48px;
margin-bottom:20px;
}

.subtitle{
font-size:16px;
opacity:0.9;
margin-bottom:25px;
}

.message{
font-size:18px;
margin-bottom:30px;
}

.footer{
font-size:14px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<h1>Coming Soon</h1>

<div class="name">
For Unnati ❤️
</div>

<div class="subtitle">
A little surprise is being prepared...
</div>

<div class="message">
Something beautiful is on its way.
This space is reserved for someone very special.
</div>

<div class="footer">
Made with ❤️ by Swarnim
</div>

</div>

<script>

/* generate floating hearts */

for(let i=0;i<25;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";
heart.style.animationDuration=(Math.random()*5+5)+"s";
document.body.appendChild(heart);
}

</script>

</body>
</html>
